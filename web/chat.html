<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Claude Chat — Learning by Building</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --ink: #e2e8f0;
      --accent: #06b6d4; --user: #3b82f6; --claude: #10b981;
      --border: #334155; --dim: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; }

    .header { padding: 12px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 16px; color: var(--accent); }
    .header .stats { font-size: 12px; color: var(--dim); }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: var(--user); color: white; border-bottom-right-radius: 4px; }
    .msg.claude { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg .meta { font-size: 11px; color: var(--dim); margin-top: 6px; }

    .input-area { padding: 16px 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .input-area textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--ink); padding: 10px; font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 120px; }
    .input-area textarea:focus { outline: none; border-color: var(--accent); }
    .input-area button { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .settings { padding: 8px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: center; font-size: 12px; }
    .settings label { color: var(--dim); }
    .settings select, .settings input[type=range] { background: var(--bg); color: var(--ink); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 12px; }
    .settings .val { color: var(--accent); min-width: 24px; }

    .progress { padding: 8px 20px; background: #1a1a2e; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; font-size: 11px; }
    .challenge { padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
    .challenge.done { border-color: var(--claude); color: var(--claude); }
    .challenge.active { border-color: var(--accent); color: var(--accent); background: rgba(6,182,212,0.1); }
    .challenge.locked { color: #475569; border-color: #475569; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Chat — Learning by Building</h1>
    <div class="stats" id="stats">tokens: 0 | requests: 0</div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="settings">
    <label>Model:
      <select id="model">
        <option value="haiku">Haiku (fast)</option>
        <option value="sonnet">Sonnet (smart)</option>
        <option value="opus">Opus (powerful)</option>
      </select>
    </label>
    <label>Temp: <input type="range" id="temp" min="0" max="1" step="0.1" value="0.3"> <span class="val" id="tempVal">0.3</span></label>
    <label>System:
      <input type="text" id="system" placeholder="Optional system prompt..." style="background:var(--bg);color:var(--ink);border:1px solid var(--border);border-radius:4px;padding:2px 6px;width:200px;font-size:12px;">
    </label>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Type a message... (Shift+Enter for newline)" rows="1"></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const API = location.origin;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statsEl = document.getElementById('stats');
    const tempSlider = document.getElementById('temp');
    const tempVal = document.getElementById('tempVal');

    let totalTokens = 0;
    let totalRequests = 0;

    tempSlider.oninput = () => tempVal.textContent = tempSlider.value;

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    async function sendMessage() {
      const msg = inputEl.value.trim();
      if (!msg) return;

      addMessage(msg, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      const claudeMsg = addMessage('', 'claude');

      try {
        const resp = await fetch(API + '/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: msg,
            model: document.getElementById('model').value,
            temperature: parseFloat(tempSlider.value),
            system: document.getElementById('system').value || null,
          }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.token) {
                claudeMsg.querySelector('.text').textContent += data.token;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }
              if (data.done) {
                totalRequests++;
                updateStats();
              }
              if (data.error) {
                claudeMsg.querySelector('.text').textContent += '\n[Error: ' + data.error + ']';
              }
            } catch {}
          }
        }
      } catch (err) {
        claudeMsg.querySelector('.text').textContent += '\n[Connection error: ' + err.message + ']';
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = `<div class="text">${escapeHtml(text)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateStats() {
      statsEl.textContent = `requests: ${totalRequests}`;
    }

    // Load learning progress
    async function loadProgress() {
      try {
        const resp = await fetch(API + '/api/learning/progress');
        const data = await resp.json();
        const el = document.getElementById('progress');
        el.innerHTML = data.challenges.map(c => {
          const cls = c.status === 'completed' ? 'done' : c.status === 'in_progress' ? 'active' : 'locked';
          return `<span class="challenge ${cls}" title="${c.title}">${c.id}</span>`;
        }).join('');
      } catch {}
    }

    loadProgress();
  </script>
</body>
</html>
